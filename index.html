.btn-small{display:inline-block;padding:6px 14px;font-size:12px;font-family:'DotGothic16',monospace;color:#222;background:#ddd;border:1px solid #999;border-radius:4px;cursor:pointer;margin:3px;}

<script>
let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playBeep(){
try{
initAudio();if(audioCtx.state==='suspended')audioCtx.resume();
const o=audioCtx.createOscillator();const g=audioCtx.createGain();
o.type='square';o.frequency.value=1400;
g.gain.setValueAtTime(0.08,audioCtx.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.06);
o.connect(g);g.connect(audioCtx.destination);
o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+0.06);
}catch(e){}
}
document.addEventListener('click',function(e){
const t=e.target;
if(t.closest('.btn')||t.closest('.btn-small')||t.closest('.action-btn')||t.closest('.choice-btn')||t.closest('[data-lc]'))playBeep();
});

let bgmPlaying=false,bgmTimer=null,bgmGain=null;

{n:76,d:0.4},{n:0,d:0.1},{n:74,d:0.4},{n:0,d:0.1},
{n:72,d:0.4},{n:0,d:0.1},{n:69,d:0.4},{n:0,d:0.1},
{n:67,d:1.2},{n:0,d:0.4},
// Phrase 2
{n:74,d:0.4},{n:0,d:0.1},{n:76,d:0.4},{n:0,d:0.1},

{n:74,d:0.4},{n:0,d:0.1},{n:76,d:0.4},{n:0,d:0.1},
{n:72,d:1.2},{n:0,d:0.4},
// Phrase 3
{n:79,d:0.4},{n:0,d:0.1},{n:81,d:0.4},{n:0,d:0.1},

{n:76,d:0.4},{n:0,d:0.1},{n:74,d:0.4},{n:0,d:0.1},

const BGM_BASS=[

];
function midiToFreq(m){return 440*Math.pow(2,(m-69)/12);}
function scheduleTrack(notes,type,vol,startTime){
initAudio();
let t=startTime;
for(const note of notes){
if(note.n>0){
const o=audioCtx.createOscillator();const g=audioCtx.createGain();
o.type=type;o.frequency.value=midiToFreq(note.n);
g.gain.setValueAtTime(vol,t);
g.gain.setValueAtTime(vol,t+note.d*0.7);
g.gain.exponentialRampToValueAtTime(0.001,t+note.d*0.95);
o.connect(g);g.connect(bgmGain);
o.start(t);o.stop(t+note.d);
}
t+=note.d;
}
return t;
}
function getBgmDuration(notes){let d=0;for(const n of notes)d+=n.d;return d;}
function startBGM(){
if(bgmPlaying)return;
initAudio();if(audioCtx.state==='suspended')audioCtx.resume();
bgmGain=audioCtx.createGain();bgmGain.gain.value=0.5;bgmGain.connect(audioCtx.destination);
bgmPlaying=true;
function loop(){
if(!bgmPlaying)return;
const now=audioCtx.currentTime+0.05;
scheduleTrack(BGM_MELODY,'triangle',0.04,now);
scheduleTrack(BGM_BASS,'sine',0.035,now);
const dur=Math.max(getBgmDuration(BGM_MELODY),getBgmDuration(BGM_BASS));
bgmTimer=setTimeout(loop,(dur-0.1)*1000);
}
loop();
}
function stopBGM(){
bgmPlaying=false;
if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null;}
if(bgmGain){bgmGain.gain.setValueAtTime(0,audioCtx.currentTime);bgmGain=null;}
}
function toggleBGM(){
if(bgmPlaying)stopBGM();else startBGM();
const btn=document.getElementById('bgm-toggle-btn');
if(btn)btn.textContent=bgmPlaying?'BGM OFF':'BGM ON';
}

function deleteSave(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}}
function hasSave(){try{return!!localStorage.getItem(SAVE_KEY);}catch(e){return false;}}
function restoreGame(d){for(const k of Object.keys(d)){if(typeof G[k]==='object'&&G[k]!==null&&!Array.isArray(G[k])){Object.assign(G[k],d[k]);}else{G[k]=d[k];}}}
let gameStarted=false;
window.addEventListener('beforeunload',function(e){if(gameStarted){e.preventDefault();e.returnValue='';}});

const TH={i:25000,s:35000,f:46000,j:60000,t:80000};
const RV_BASE=[
{n:'BASSARI',br:'C'},{n:'北極星',br:'A'},{n:'奪家白猫',br:'A'},

{n:'赤フン隊',br:'A'},{n:'ノーススター学園',br:'A'},
{n:'つっぱりファラオーズ',br:'B'},{n:'チアダンサーズ',br:'D'},{n:'テンブリュー・ジン',br:'S'},{n:'テン・ジン',br:'S'},
{n:'D・K・D',br:'B'},{n:'輪っか',br:'S'},{n:'ラスク＆踊人',br:'C'},{n:'お見事',br:'D'},{n:'乳製品学園大学',br:'B'}

for(var j=0;j<tb.length-1;j++){if(kd>=tb[j+1].kd&&kd<=tb[j].kd){hi=tb[j];lo=tb[j+1];break;}}
if(kd>=9000){lo=hi=tb[0];}
if(kd<=3000){lo=hi=tb[tb.length-1];}
var range=hi.kd-lo.kd;var t=range===0?1:(kd-lo.kd)/range;
var pf=lo.f+(hi.f-lo.f)*t;
var ps=lo.s+(hi.s-lo.s)*t;
var pi=lo.i+(hi.i-lo.i)*t;
var pd=100-pf-ps-pi;if(pd<0)pd=0;
var r=Math.random()*100;
if(r<pf)return'fi';
if(r<pf+ps)return'se';
if(r<pf+ps+pi)return'ic';
return'out';
}
const blkSorted=[...blk].sort(function(a,b){
const ka=G.rv&&G.rv[a]?G.rv[a].kd:5000;
const kb=G.rv&&G.rv[b]?G.rv[b].kd:5000;
return kb-ka;
});
let blkFi=false,blkSe=false,blkIc=false;
for(const t of blkSorted){
const rkd=G.rv&&G.rv[t]?G.rv[t].kd:5000;
let place=rivalPlace(rkd);
if(place==='fi'&&blkFi)place='se';
if(place==='se'&&blkSe)place='ic';
if(place==='ic'&&blkIc)place='out';
if(place==='fi'){fi.push(t);blkFi=true;}
else if(place==='se'){se.push(t);blkSe=true;}
else if(place==='ic'){ic.push(t);blkIc=true;}
}
const inF=sieve>=3,inS=sieve===2,inI=sieve===1;
let pi=0;
const fiNeed=Math.max(0,10-fi.length-(inF?1:0));
const seNeed=Math.max(0,10-se.length-(inS?1:0));

for(let i=0;i<seNeed;i++)se.push(pool[pi++]);
if(inS)se.push(G.tn);
for(let i=0;i<icNeed;i++)ic.push(pool[pi++]);
if(inI)ic.push(G.tn);

else{const sn=se.filter(t=>t!==G.tn);sA=sn[Math.floor(Math.random()*sn.length)];}

let rt='',rl=0;
if(sieve===0){rt='審査落ち';rl=0;}else if(sieve===1){rt='一次審査員賞';rl=1;}
else if(sieve===2&&!pA){rt='セミファイナル進出';rl=2;}
else if(pA){rt='ファイナル進出(セミから)';rl=3;if(fr==='taisho'){rt='大賞';rl=5;}else if(fr==='jun'){rt='準大賞';rl=4;}}
else{if(fr==='taisho'){rt='大賞';rl=5;}else if(fr==='jun'){rt='準大賞';rl=4;}else{rt='ファイナル進出';rl=3;}}
G.cc={teams,kd,lastKd,adj:Math.round(adj),cb,rt,rl,sieve,pA,fr,blk,fi,se,ic,sA,fF,tT,jT,pIF,blocked,rc,

let h='';
for(let i=0;i<entries.length;i++){
const e=entries[i];
const bg=e.isPlayer?'background:#fff3cd;':'';
const br=e.br?` [${e.br}]`:'';
h+=`<div style="display:flex;align-items:center;padding:2px 4px;border-bottom:1px solid #eee;${bg}">
<span style="color:#888;min-width:32px;font-size:10px;">${i+1}位</span>
<span style="flex:1;font-size:10px;${e.isPlayer?'font-weight:bold;color:#c00;':''}">${e.isPlayer?'★ '+e.n:e.n}${br}</span>
<span style="font-weight:bold;font-size:10px;">${(e.kd/100).toFixed(2)}</span>
</div>`;}
document.getElementById('rival-content').innerHTML=h;
}

function drawGraph(){
const canvas=document.getElementById('graph-canvas');if(!canvas)return;
const ctx=canvas.getContext('2d');const W=canvas.width,H=canvas.height;
ctx.clearRect(0,0,W,H);
const hist=G.hist||[];if(hist.length===0){ctx.font='12px DotGothic16';ctx.fillStyle='#888';ctx.textAlign='center';ctx.fillText('大会結果がまだありません',W/2,H/2);return;}
const pad={t:20,b:30,l:45,r:45};const gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;
const years=hist.map(h=>h.year);const kds=hist.map(h=>h.kd);const mems=hist.map(h=>h.members);
const maxKd=Math.max(...kds);const maxMem=Math.max(...mems);
const kdSteps=[5000,10000,15000,20000,30000,40000,50000,60000,72000];
const memSteps=[15,20,30,40,50,75,100,150];
function niceMax(val,steps){for(const s of steps){if(val<=s)return s;}return steps[steps.length-1];}
const kdMax=niceMax(maxKd,kdSteps);const memMax=niceMax(maxMem,memSteps);
const n=hist.length;
ctx.strokeStyle='#ddd';ctx.lineWidth=1;
for(let i=0;i<=4;i++){const y=pad.t+gH*(i/4);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();}
ctx.font='9px DotGothic16';ctx.textAlign='center';ctx.fillStyle='#666';
for(let i=0;i<n;i++){const x=pad.l+(n===1?gW/2:gW*i/(n-1));ctx.fillText(years[i]+'年',x,H-8);}
ctx.textAlign='right';ctx.fillStyle='#dc3545';
for(let i=0;i<=4;i++){const y=pad.t+gH*(1-i/4);ctx.fillText(Math.round(kdMax*i/4),pad.l-4,y+3);}
ctx.textAlign='left';ctx.fillStyle='#2196f3';
for(let i=0;i<=4;i++){const y=pad.t+gH*(1-i/4);ctx.fillText(Math.round(memMax*i/4)+'人',W-pad.r+4,y+3);}
ctx.strokeStyle='#dc3545';ctx.lineWidth=2;ctx.beginPath();
for(let i=0;i<n;i++){const x=pad.l+(n===1?gW/2:gW*i/(n-1));const y=pad.t+gH*(1-kds[i]/kdMax);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
ctx.stroke();
for(let i=0;i<n;i++){const x=pad.l+(n===1?gW/2:gW*i/(n-1));const y=pad.t+gH*(1-kds[i]/kdMax);ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle='#dc3545';ctx.fill();}
ctx.strokeStyle='#2196f3';ctx.lineWidth=2;ctx.beginPath();
for(let i=0;i<n;i++){const x=pad.l+(n===1?gW/2:gW*i/(n-1));const y=pad.t+gH*(1-mems[i]/memMax);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
ctx.stroke();
for(let i=0;i<n;i++){const x=pad.l+(n===1?gW/2:gW*i/(n-1));const y=pad.t+gH*(1-mems[i]/memMax);ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle='#2196f3';ctx.fill();}
ctx.font='10px DotGothic16';ctx.fillStyle='#dc3545';ctx.textAlign='left';ctx.fillText('● 感動力',pad.l,12);
ctx.fillStyle='#2196f3';ctx.fillText('● メンバー数',pad.l+80,12);
}
